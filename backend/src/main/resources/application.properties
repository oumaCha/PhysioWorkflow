spring.application.name=workflow-backend

spring.datasource.url=jdbc:postgresql://localhost:5433/physioflow
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.docker.compose.enabled=false

management.endpoints.web.exposure.include=mappings,health,info

logging.level.de.physio.workflow=DEBUG
logging.level.org.springframework.web=INFO

server.port=8081

frontend.origin=http://localhost:5173
